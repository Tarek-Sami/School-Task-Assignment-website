<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTP Verification</title>
    <link rel="stylesheet" href="../styles/shared/otp.css" />
    <link rel="stylesheet" href="/styles/shared/main-nav.css" />
    <link rel="stylesheet" href="../styles/shared/footer.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="/scripts/route-restriction/route-restrict.js"></script>
    <link
      rel="shortcut icon"
      href="/assets/media/logo/purpleLogo.ico"
      type="image/x-icon"
    />
  </head>
  <body>
    <div id="navbar"></div>
    <main class="center">
      <section class="card" aria-labelledby="otp-title">
        <h1 class="headline" id="otp-title">Verify OTP</h1>
        <p class="textp">
          Enter the 6-digit code sent to your email to continue.
        </p>

        <form novalidate>
          <label for="otp">OTP CODE</label>
          <input
            type="text"
            id="otp"
            maxlength="6"
            placeholder="Enter 6-digit OTP"
            required
          />
          <button type="submit" formaction="change-password.html">
            Verify OTP
          </button>
        </form>
      </section>
      <div class="help-text">
        Didn't receive code?
        <a href="otp.html">Resend OTP</a>
      </div>
      <div class="help-text secondary">
        Back to
        <a href="login.html">Login</a>
      </div>
    </main>
    <div class="footer"></div>
    <script src="/scripts/shared/nav.js" defer></script>

    <script src="../scripts/shared/footer.js" defer></script>
  </body>
</html>
