<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password</title>
    <link rel="stylesheet" href="../styles/shared/change-password.css" />
  </head>
  <body>
    <form novalidate>
      <div class="center">
        <div class="card">
          <h1 class="headline">Change Password</h1>
          <p class="textp">Set a strong new password to secure your account.</p>

          <label for="new-password">NEW PASSWORD</label>
          <input
            type="password"
            id="new-password"
            name="new-password"
            placeholder="Enter new password"
            required
            minlength="6"
          />

          <label for="confirm-new-password">CONFIRM NEW PASSWORD</label>
          <input
            type="password"
            id="confirm-new-password"
            name="confirm-new-password"
            placeholder="Confirm new password"
            required
            minlength="6"
          />

          <button type="submit" formaction="login.html">Update Password</button>
        </div>

        <div class="signup-text">
          Remember your password?
          <a href="login.html">Back to Login</a>
        </div>
      </div>
    </form>
  </body>
</html>
