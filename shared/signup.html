<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>
    <link rel="stylesheet" href="../styles/shared/signup.css" />
    <link rel="stylesheet" href="/styles/shared/main-nav.css" />
    <link rel="stylesheet" href="../styles/shared/footer.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
  <body>
    <div id="navbar"></div>
    <form novalidate>
      <div class="center">
        <div class="card">
          <h1 class="headline">Create Account</h1>
          <p class="textp">
            Fill in your details to create an EduFlow account and start managing
            tasks easily.
          </p>

          <label for="name">FULL NAME</label>
          <input
            type="text"
            id="name"
            placeholder="Enter your name"
            required
            minlength="3"
          />

          <label for="user">USERNAME</label>
          <input
            type="text"
            id="user"
            placeholder="Enter your username"
            required
            minlength="4"
          />

          <label for="email">EMAIL ADDRESS</label>
          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
          />

          <label for="phone">PHONE NUMBER</label>
          <input
            type="tel"
            id="phone"
            placeholder="Enter your phone number"
            minlength="11"
          />

          <label for="password">PASSWORD</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            required
            minlength="6"
          />

          <label for="confirm-password">CONFIRM PASSWORD</label>
          <input
            type="password"
            id="confirm-password"
            placeholder="Confirm password"
            required
            minlength="6"
          />

          <label for="role">ROLE</label>
          <select id="role" required>
            <option value="">Select your role</option>
            <option value="teacher">Teacher</option>
            <option value="admin">Admin</option>
          </select>

          <div class="gender-title">GENDER</div>
          <div class="gender-group">
            <label class="gender-option" for="m">
              <input type="radio" name="gender" id="m" />
              <span>Male</span>
            </label>
            <label class="gender-option" for="f">
              <input type="radio" name="gender" id="f" />
              <span>Female</span>
            </label>
          </div>

          <button type="submit" class="signup-button">Sign Up</button>
        </div>

        <div class="login-text">
          Already have an account?
          <a href="login.html">Login</a>
        </div>
      </div>
    </form>
    <div class="footer"></div>
    <script src="../scripts/shared/nav.js" defer></script>
    <script src="../scripts/shared/footer.js" defer></script>
    <script src="../scripts/shared/signup.js" defer></script>
  </body>
</html>
