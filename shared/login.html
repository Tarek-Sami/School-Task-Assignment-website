<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
  </head>
  <body>
    <iframe
      src="../shared/main_nav.html"
      style="width: 100%; height: 54px; border: none"
    ></iframe>
    <br /><br /><br /><br />
    <h1 align="center">Login</h1>
    <form>
      <table align="center" cellpadding="10">
        <tr>
          <td><label for="email">Email</label></td>
          <td>
            <input
              type="email"
              id="email"
              placeholder="Enter your email"
              required
            />
          </td>
        </tr>

        <tr>
          <td><label for="password">Password</label></td>
          <td>
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
              required
              minlength="6"
            />
          </td>
        </tr>

        <tr>
          <td colspan="2">
            <input type="checkbox" id="c" /> <label for="c">Remember me</label>
          </td>
        </tr>

        <tr>
          <td colspan="2" align="center">
            <button type="submit" formaction="../admin/dashboard.html">
              Login as Admin
            </button>

            <button type="submit" formaction="../teacher/dashboard.html">
              Login as Teacher
            </button>
          </td>
        </tr>

        <tr>
          <td colspan="2" align="center">
            <a href="forgot-password.html" target="_top">Forgot Password</a>
          </td>
        </tr>

        <tr>
          <td colspan="2" align="center">
            Don't have an account?
            <a href="signup.html" target="_top">Sign Up</a>
          </td>
        </tr>
      </table>
    </form>
  </body>
</html>
