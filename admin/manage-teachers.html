<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Teachers</title>
    <link rel="stylesheet" href="../styles/global/global.css" />
    <link rel="stylesheet" href="../styles/global/components.css" />

    <link rel="stylesheet" href="../styles/admin/manage-teachers.css" />
    <link rel="stylesheet" href="/styles/shared/main-nav.css" />
    <link rel="stylesheet" href="../styles/shared/footer.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="/scripts/route-restriction/route-restrict.js"></script>
  </head>
  <body class="manage-teachers-page">
    <div id="navbar"></div>
    <header class="page-header">
      <h1>Teacher Management</h1>
    </header>

    <div class="container1">
      <div class="stats-grid">
        <div class="stat-title">
          <p class="stat-title-label">Total Active Faculty</p>
          <p class="stat-title-value stat-title-value-blue teachers-count"></p>
          <p class="stat-title-meta stat-title-meta-positive">
            <i class="fa-solid fa-arrow-trend-up"></i>
            +4 this month
          </p>
        </div>
        <div class="stat-title">
          <p class="stat-title-label">Avg. Faculty Workload</p>
          <p class="stat-title-value stat-title-value-teal avg-tasks">12.4</p>
          <p class="stat-title-meta">
            <i class="fa-regular fa-clock"></i>
            Tasks per teacher
          </p>
        </div>
      </div>
      <section class="roster-section">
        <div class="roster-toolbar">
          <h2 id="roster-heading" class="roster-heading">Teachers</h2>
          <div class="roster-controls">
            <div class="roster-search">
              <div class="search-wrap">
                <input
                  id="teacher-search"
                  type="search"
                  placeholder="Search teachers by name or department…"
                />
                <button type="button" class="search-submit">
                  <i class="fa-solid fa-magnifying-glass"></i>
                </button>
              </div>
            </div>
            <button type="button" class="filter-btn">
              <i class="fa-solid fa-filter"></i>
            </button>
          </div>
        </div>

        <div class="teacher-list"></div>
      </section>
    </div>
    <div class="modal" id="filterModal" aria-hidden="true" role="presentation">
      <div
        class="modal-content"
        role="dialog"
        aria-modal="true"
        aria-labelledby="filterModalTitle"
        tabindex="-1"
      >
        <header class="modal-header">
          <div class="modal-header-text">
            <h2 id="filterModalTitle">Filters</h2>
            <p class="modal-subtitle">Refine the teacher list</p>
          </div>
          <button type="button" class="modal-close" aria-label="Close filters">
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>
        </header>

        <div class="modal-body">
          <label class="field-label" for="filter-modal-search">Search</label>
          <input
            id="filter-modal-search"
            type="text"
            placeholder="Search by name or department…"
            autocomplete="off"
          />

          <label class="field-label" for="filter-modal-department"
            >Department</label
          >
          <select id="filter-modal-department">
            <option value="All">All departments</option>
            <option value="Mathematics">Mathematics</option>
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Biology">Biology</option>
            <option value="Computer Science">Computer Science</option>
            <option value="English">English</option>
          </select>

          <span class="field-label" id="filter-gender-legend">Gender</span>
          <div
            class="radio-group"
            role="group"
            aria-labelledby="filter-gender-legend"
          >
            <label class="radio-chip">
              <input type="radio" name="filter-gender" value="all" checked />
              <span>All</span>
            </label>
            <label class="radio-chip">
              <input type="radio" name="filter-gender" value="male" />
              <span>Male</span>
            </label>
            <label class="radio-chip">
              <input type="radio" name="filter-gender" value="female" />
              <span>Female</span>
            </label>
          </div>
        </div>

        <footer class="modal-actions">
          <button type="button" class="modal-btn modal-btn-reset">Reset</button>
          <button type="button" class="modal-btn modal-btn-apply">
            Apply filters
          </button>
        </footer>
      </div>
    </div>

    <div class="pagination" id="pagination"></div>
    <div class="footer"></div>
    <script src="/scripts/shared/nav.js" defer></script>

    <script src="/scripts/shared/footer.js" defer></script>
    <script src="/scripts/admin/manage-teacher.js"></script>
  </body>
</html>
