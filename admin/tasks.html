<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curriculum Tasks</title>
    <link rel="stylesheet" href="../styles/global/global.css" />
    <link rel="stylesheet" href="../styles/global/components.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../styles/admin/tasks.css" />
    <link rel="stylesheet" href="/styles/shared/main-nav.css" />
    <link rel="stylesheet" href="../styles/shared/footer.css" />
  </head>
  <body class="tasks-page">
    <div id="navbar"></div>
    <header class="page-header">
      <h1>Curriculum Tasks</h1>
      <p>Manage and track departmental academic deliverables.</p>
    </header>

    <div class="container1">
      <div class="search-and-filter">
        <div class="search-wrap">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input
            id="task-search"
            type="search"
            placeholder="Search curriculum, faculty, or status..."
            autocomplete="off"
          />
        </div>
        <div class="filter-pills">
          <button type="button" class="filter-pill active" data-priority="all" style="color: black;">ALL</button>
          <button type="button" class="filter-pill" data-priority="high">HIGH</button>
          <button type="button" class="filter-pill" data-priority="medium">MEDIUM</button>
          <button type="button" class="filter-pill" data-priority="low">LOW</button>
        </div>
      </div>

      <div class="tasks-grid"></div>
    </div>

    <a href="add-task.html" class="fab" aria-label="Add new task">
      <i class="fa-solid fa-plus"></i>
    </a>
    <div class="footer"></div>
    <script src="../scripts/shared/nav.js" defer></script>
    <script src="../scripts/shared/footer.js" defer></script>
    <script src="../scripts/admin/tasks.js" defer></script>
  </body>
</html>
