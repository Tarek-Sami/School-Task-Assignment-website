<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/global/global.css" />
    <link rel="stylesheet" href="../styles/global/components.css" />
    <link rel="stylesheet" href="../styles/teacher/my-tasks.css" />
    <title>My Tasks</title>
    <link rel="stylesheet" href="/styles/shared/main-nav.css" />
    <link rel="stylesheet" href="../styles/shared/footer.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="/scripts/route-restriction/route-restrict.js"></script>
  </head>

  <body class="tasks-page">
    <div id="navbar"></div>

    <header class="page-header">
      <h1>My Tasks</h1>
      <p>Track your assigned work with quick priority filtering.</p>
    </header>

    <div class="container1">
      <div class="search-and-filter">
        <div class="search-wrap">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input
            id="task-search"
            type="search"
            placeholder="Search by task, creator, or status..."
            autocomplete="off"
          />
        </div>
        <div class="filter-group">
          <span class="filter-label">PRIORITY</span>
          <div class="filter-pills">
            <button
              type="button"
              class="filter-pill active"
              data-priority="all"
            >
              ALL
            </button>
            <button type="button" class="filter-pill" data-priority="high">
              HIGH
            </button>
            <button type="button" class="filter-pill" data-priority="medium">
              MEDIUM
            </button>
            <button type="button" class="filter-pill" data-priority="low">
              LOW
            </button>
          </div>
        </div>
        <div class="filter-group filter-group-inline">
          <span class="filter-label">STATUS</span>
          <div class="filter-pills filter-pills-status">
            <button
              type="button"
              class="filter-pill active"
              data-completed="all"
            >
              ALL
            </button>
            <button
              type="button"
              class="filter-pill"
              data-completed="completed"
            >
              COMPLETED
            </button>
            <button type="button" class="filter-pill" data-completed="pending">
              PENDING
            </button>
          </div>
        </div>
      </div>

      <div class="tasks-grid"></div>
    </div>

    <div class="footer"></div>
    <script src="/scripts/shared/nav.js" defer></script>

    <script src="../scripts/shared/footer.js" defer></script>
    <script src="../scripts/teacher/my-tasks.js" defer></script>
  </body>
</html>
