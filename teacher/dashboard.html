<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="../styles/global/global.css" />
    <link rel="stylesheet" href="../styles/teacher/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/shared/main-nav.css" />
    <link rel="stylesheet" href="../styles/shared/footer.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="/scripts/route-restriction/route-restrict.js"></script>
  </head>
  <body>
    <div id="navbar"></div>

    <div class="container1">
      <div class="header">
        <h1>Welcome back, teacher!</h1>
        <p>Here's an overview of your academic operations for today.</p>
      </div>

      <div class="cards">
        <div class="card">
          <div class="card-icon-wrapper bg-purple">
            <i class="fa-solid fa-clipboard-list card-icon text-purple"></i>
          </div>
          <h3>TOTAL TASKS</h3>
          <span id="total-tasks">5</span>
        </div>

        <div class="card">
          <div class="card-icon-wrapper bg-cyan">
            <i class="fa-solid fa-circle-check card-icon text-cyan"></i>
          </div>
          <h3>COMPLETED</h3>
          <span id="completed-tasks">2</span>
        </div>

        <div class="card">
          <div class="card-icon-wrapper bg-red">
            <i class="fa-solid fa-clipboard-list card-icon text-red"></i>
          </div>
          <h3>PENDING</h3>
          <span id="pending-tasks">3</span>
        </div>
      </div>

      <div class="tasks-header">
        <h2>All Tasks</h2>
      </div>

      <div class="task-list"></div>
    </div>
    <div class="footer"></div>
    <script src="/scripts/shared/nav.js" defer></script>

    <script src="../scripts/shared/footer.js" defer></script>
    <script src="../scripts/teacher/dashboard.js" defer></script>
  </body>
</html>
